{{define "change_password.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
    {{template "head"}}
    <title>Change Password - {{siteTitle}}</title>
</head>
<body>
    {{template "nav" .}}
    <div class="container main">
        <div class="container-sm">
            <div class="card card-lg">
                <h1 class="text-2xl font-bold mb-1">Change Password</h1>
                <p class="text-sm text-muted mb-3">You must change your password before continuing.</p>

                {{if .Error}}<div class="alert alert-error">{{.Error}}</div>{{end}}

                <form method="POST" action="/change-password">
                    <div class="form-group">
                        <label for="new_password" class="form-label">New Password</label>
                        <input type="password" id="new_password" name="new_password" required minlength="8" class="form-input">
                    </div>
                    <div class="form-group">
                        <label for="confirm_password" class="form-label">Confirm Password</label>
                        <input type="password" id="confirm_password" name="confirm_password" required minlength="8" class="form-input">
                    </div>
                    <button type="submit" class="btn btn-primary w-full">Update Password</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
{{end}}
