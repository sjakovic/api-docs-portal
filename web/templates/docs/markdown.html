{{define "docs_markdown.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
    {{template "head"}}
    <title>{{.Doc.Name}} - {{siteTitle}}</title>
</head>
<body>
    {{template "nav" .}}
    <div class="container-md main">
        <div class="doc-header">
            <a href="/docs" class="doc-back">&larr; Back to Docs</a>
            <h1 class="doc-title">{{.Doc.Name}}</h1>
            {{if .Doc.Version.Valid}}<span class="doc-version mono">{{.Doc.Version.String}}</span>{{end}}
        </div>
        <div class="card card-lg prose">
            {{.RenderedContent}}
        </div>
    </div>
</body>
</html>
{{end}}
