{{define "admin_permissions.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
    {{template "head"}}
    <title>Permissions - {{siteTitle}}</title>
</head>
<body>
    {{template "nav" .}}
    <div class="container main">
        <div class="mb-3">
            <a href="/admin/docs" class="doc-back">&larr; Back to Docs</a>
            <h1 class="text-2xl font-bold mt-1">Permissions: {{.Doc.Name}}</h1>
            <p class="text-sm text-muted mt-1">Select which users can access this documentation. Admins always have access.</p>
        </div>

        {{template "toast" .}}

        <div class="card">
            <form method="POST" action="/admin/docs/{{.Doc.ID}}/permissions">
                <div class="mb-3">
                    {{range .AllUsers}}
                    <label class="check-item">
                        <input type="checkbox" name="user_ids" value="{{.ID}}" class="form-checkbox"
                            {{if eq .Role "admin"}}checked disabled{{else}}{{if index $.GrantedMap .ID}}checked{{end}}{{end}}>
                        <div>
                            <span class="check-label-name">{{.Name}}</span>
                            <span class="check-label-email">{{.Email}}</span>
                            {{if eq .Role "admin"}}<span class="check-label-hint">(admin - always has access)</span>{{end}}
                        </div>
                    </label>
                    {{end}}
                </div>
                <button type="submit" class="btn btn-primary">Save Permissions</button>
            </form>
        </div>
    </div>
</body>
</html>
{{end}}
