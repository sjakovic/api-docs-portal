name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Download Swagger UI
        run: make swagger-ui

      - name: Build
        run: go build ./cmd/server/main.go

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -v
